<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="ta3 da3">
  <title id="ta3">After: guided replacement wizard with numbered steps</title>
  <desc id="da3">Wireframe showing a vertical stepper with three numbered stages and a persistent summary sidebar for fees and documents.</desc>
  <rect width="640" height="360" fill="#F9F9F7"/>
  <rect x="16" y="16" width="400" height="320" fill="#fff" stroke="#111111"/>
  <text x="28" y="44" font-family="sans-serif" font-size="12" fill="#111111" font-weight="bold">Replace lost license</text>
  <rect x="28" y="60" width="24" height="24" fill="#CC0000"/>
  <text x="34" y="78" font-family="sans-serif" font-size="11" fill="#F9F9F7">1</text>
  <text x="60" y="78" font-family="sans-serif" font-size="10" fill="#111111">Confirm eligibility</text>
  <rect x="28" y="96" width="24" height="24" fill="#111111"/>
  <text x="34" y="114" font-family="sans-serif" font-size="11" fill="#F9F9F7">2</text>
  <text x="60" y="114" font-family="sans-serif" font-size="10" fill="#111111">Gather documents</text>
  <rect x="28" y="132" width="24" height="24" fill="#E5E5E0" stroke="#111111"/>
  <text x="34" y="150" font-family="sans-serif" font-size="11" fill="#111111">3</text>
  <text x="60" y="150" font-family="sans-serif" font-size="10" fill="#111111">Schedule or walk-in</text>
  <rect x="432" y="16" width="192" height="320" fill="#111111"/>
  <text x="444" y="44" font-family="sans-serif" font-size="10" fill="#F9F9F7">Summary</text>
  <rect x="444" y="60" width="160" height="60" fill="#F9F9F7" stroke="#F9F9F7"/>
  <text x="452" y="84" font-family="sans-serif" font-size="9" fill="#111111">Fees · Wait time · Forms</text>
</svg>
