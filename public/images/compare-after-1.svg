<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="t2 d2">
  <title id="t2">Representative after state: prioritized actions and distinct labels</title>
  <desc id="d2">Wireframe showing a primary action row for common tasks and a secondary row for supporting information, reducing ambiguity.</desc>
  <rect width="640" height="360" fill="#F9F9F7"/>
  <rect x="0" y="0" width="640" height="48" fill="#111111"/>
  <text x="16" y="32" font-family="sans-serif" font-size="14" fill="#F9F9F7">DDS · Do this next</text>
  <rect x="16" y="64" width="300" height="40" fill="#CC0000" stroke="#111111"/>
  <text x="28" y="90" font-family="sans-serif" font-size="11" fill="#F9F9F7">Schedule appointment</text>
  <rect x="332" y="64" width="292" height="40" fill="#F9F9F7" stroke="#111111"/>
  <text x="344" y="90" font-family="sans-serif" font-size="11" fill="#111111">Online services</text>
  <rect x="16" y="120" width="608" height="56" fill="#E5E5E0" stroke="#111111"/>
  <text x="28" y="148" font-family="sans-serif" font-size="10" fill="#111111">I need to: Renew · Replace lost ID · Road test · Real ID checklist · Locations</text>
  <rect x="16" y="192" width="400" height="140" fill="#fff" stroke="#111111"/>
  <rect x="432" y="192" width="192" height="140" fill="#fff" stroke="#111111"/>
  <text x="28" y="220" font-family="sans-serif" font-size="11" fill="#111111" font-weight="bold">What to bring (checklist)</text>
  <rect x="28" y="232" width="360" height="8" fill="#111111" opacity="0.15"/>
  <rect x="28" y="248" width="340" height="8" fill="#111111" opacity="0.15"/>
  <rect x="28" y="264" width="350" height="8" fill="#111111" opacity="0.15"/>
  <text x="448" y="220" font-family="sans-serif" font-size="10" fill="#111111">Next steps</text>
  <rect x="448" y="232" width="160" height="84" fill="#F5F5F5" stroke="#111111"/>
</svg>
