<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" role="img" aria-labelledby="bannerTitle bannerDesc">
  <title id="bannerTitle">Editorial banner for Georgia DDS usability study</title>
  <desc id="bannerDesc">High-contrast newsprint graphic with Georgia outline, grid lines, and headline typography referencing driver services research.</desc>
  <rect width="1600" height="420" fill="#F9F9F7"/>
  <defs>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#111111" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1600" height="420" fill="url(#dots)"/>
  <g opacity="0.12" stroke="#111111" stroke-width="1">
    <line x1="0" y1="105" x2="1600" y2="105"/>
    <line x1="0" y1="210" x2="1600" y2="210"/>
    <line x1="0" y1="315" x2="1600" y2="315"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="800" y1="0" x2="800" y2="420"/>
    <line x1="1000" y1="0" x2="1000" y2="420"/>
    <line x1="1200" y1="0" x2="1200" y2="420"/>
    <line x1="1400" y1="0" x2="1400" y2="420"/>
  </g>
  <rect x="48" y="48" width="1104" height="324" fill="none" stroke="#111111" stroke-width="3"/>
  <text x="80" y="130" font-family="Georgia, serif" font-size="42" fill="#111111">GEORGIA</text>
  <text x="80" y="210" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#111111">DDS</text>
  <text x="80" y="270" font-family="Georgia, serif" font-size="28" fill="#CC0000">USABILITY &amp; REDESIGN</text>
  <text x="80" y="320" font-family="Georgia, serif" font-size="22" fill="#525252">Technical report · citizen-facing digital services</text>
  <path d="M1180 80 L1320 80 L1380 200 L1240 340 L1100 200 Z" fill="none" stroke="#111111" stroke-width="2"/>
  <text x="1140" y="210" transform="rotate(-12 1240 210)" font-family="monospace" font-size="18" fill="#111111">VOL. 1</text>
  <text x="1180" y="360" font-family="monospace" font-size="14" fill="#737373">TASK SUCCESS · NAV CONFUSION · DOC DISCOVERY</text>
</svg>
