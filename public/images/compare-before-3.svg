<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="tb3 db3">
  <title id="tb3">Before: replacing a lost license spans multiple hops</title>
  <desc id="db3">Flow diagram style wireframe showing three sequential page thumbnails connected by arrows, indicating fragmented steps.</desc>
  <rect width="640" height="360" fill="#F9F9F7"/>
  <rect x="24" y="80" width="160" height="200" fill="#fff" stroke="#111111"/>
  <text x="36" y="110" font-family="sans-serif" font-size="10" fill="#111111">Page A</text>
  <rect x="36" y="124" width="120" height="8" fill="#111111" opacity="0.15"/>
  <rect x="36" y="140" width="120" height="8" fill="#111111" opacity="0.15"/>
  <text x="200" y="190" font-family="sans-serif" font-size="18" fill="#111111">’</text>
  <rect x="240" y="80" width="160" height="200" fill="#fff" stroke="#111111"/>
  <text x="252" y="110" font-family="sans-serif" font-size="10" fill="#111111">Page B</text>
  <rect x="252" y="124" width="120" height="8" fill="#111111" opacity="0.15"/>
  <text x="416" y="190" font-family="sans-serif" font-size="18" fill="#111111">’</text>
